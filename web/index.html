<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AcherLab Panel</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        cyan: '#19D7FF', azure: '#2F8BFF', royal: '#3A5BFF',
        indigo: '#5A4DFF', dark: '#05070D', light: '#F5F7FA'
      }
    }
  }
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
* { font-family: 'Inter', sans-serif; }
body { background: #05070D; color: #F5F7FA; }
.card { background: linear-gradient(135deg, rgba(25,215,255,0.05), rgba(90,77,255,0.05)); border: 1px solid rgba(25,215,255,0.1); border-radius: 16px; backdrop-filter: blur(10px); transition: all 0.3s; }
.card:hover { border-color: rgba(25,215,255,0.3); box-shadow: 0 0 30px rgba(25,215,255,0.1); transform: translateY(-2px); }
.stat-card { background: rgba(25,215,255,0.03); border: 1px solid rgba(25,215,255,0.08); border-radius: 12px; padding: 20px; }
.stat-card:hover { border-color: rgba(25,215,255,0.25); }
.gradient-text { background: linear-gradient(135deg, #19D7FF, #2F8BFF, #3A5BFF, #5A4DFF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.btn-cyan { background: linear-gradient(135deg, #19D7FF, #2F8BFF); color: #05070D; font-weight: 600; border: none; border-radius: 8px; padding: 8px 20px; cursor: pointer; transition: all 0.3s; }
.btn-cyan:hover { transform: translateY(-2px); box-shadow: 0 0 25px rgba(25,215,255,0.4); }
.btn-outline { border: 1px solid #19D7FF; color: #19D7FF; background: transparent; border-radius: 8px; padding: 8px 20px; cursor: pointer; transition: all 0.3s; }
.btn-outline:hover { background: rgba(25,215,255,0.1); }
</style>
</head>
<body class="min-h-screen">
  <nav class="border-b border-[rgba(25,215,255,0.1)] px-6 py-4">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-[#19D7FF] to-[#5A4DFF] flex items-center justify-center font-bold text-sm">A</div>
        <span class="text-xl font-bold gradient-text">AcherLab Panel</span>
      </div>
      <div class="flex gap-3">
        <span class="px-3 py-1 rounded-full bg-[rgba(25,215,255,0.1)] text-[#19D7FF] text-sm">v2.0.0</span>
        <span class="px-3 py-1 rounded-full bg-[rgba(25,215,255,0.1)] text-[#19D7FF] text-sm flex items-center gap-1">
          <span class="w-2 h-2 rounded-full bg-[#19D7FF] animate-pulse"></span> Online
        </span>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-6 py-8">
    <div class="text-center mb-12">
      <h1 class="text-5xl font-bold gradient-text glow-text mb-3">AcherLab Panel</h1>
      <p class="text-gray-400 text-lg">AI-Powered Infrastructure Management</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
      <div class="stat-card text-center">
        <div class="text-3xl font-bold gradient-text" id="cpuVal">0%</div>
        <div class="text-gray-400 text-sm mt-1">CPU</div>
      </div>
      <div class="stat-card text-center">
        <div class="text-3xl font-bold gradient-text" id="memVal">0%</div>
        <div class="text-gray-400 text-sm mt-1">Memory</div>
      </div>
      <div class="stat-card text-center">
        <div class="text-3xl font-bold gradient-text" id="diskVal">0%</div>
        <div class="text-gray-400 text-sm mt-1">Disk</div>
      </div>
      <div class="stat-card text-center">
        <div class="text-3xl font-bold gradient-text" id="uptimeVal">99.9%</div>
        <div class="text-gray-400 text-sm mt-1">Uptime</div>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
      <div class="card p-6">
        <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
          <span>AI Assistant</span>
          <span class="px-2 py-0.5 text-xs rounded-full bg-[rgba(25,215,255,0.1)] text-[#19D7FF]">Live</span>
        </h2>
        <div class="mb-4 h-48 overflow-y-auto bg-[rgba(0,0,0,0.3)] rounded-lg p-4" id="chatBox">
          <div class="text-[#19D7FF] mb-2">AcherLab AI: Xin chao! Toi la AcherLab AI. Toi co the giup gi?</div>
        </div>
        <div class="flex gap-2">
          <input id="chatInput" class="flex-1 bg-[rgba(255,255,255,0.05)] border border-[rgba(25,215,255,0.2)] rounded-lg px-4 py-2 text-white outline-none focus:border-[#19D7FF]" placeholder="Nhap tin nhan..." onkeypress="if(event.key==='Enter') sendChat()">
          <button onclick="sendChat()" class="btn-cyan">Gui</button>
        </div>
      </div>
      <div class="card p-6">
        <h2 class="text-xl font-bold mb-4">Services</h2>
        <div id="services" class="space-y-3"></div>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
      <div class="card p-6">
        <h2 class="text-xl font-bold mb-4">Tunnel Manager</h2>
        <div id="tunnels" class="space-y-3"></div>
      </div>
      <div class="card p-6">
        <h2 class="text-xl font-bold mb-4">Quick Actions</h2>
        <div class="grid grid-cols-2 gap-3">
          <button onclick="alert('AcherLab Tunnel API dang chay!')" class="btn-cyan text-sm py-3">Tao Tunnel</button>
          <button onclick="window.open('https://github.com/acherlab-ai/AcherLab-RDP','_blank')" class="btn-outline text-sm py-3 text-center">RDP Service</button>
          <button onclick="alert('AcherLab AI Assistant san sang!')" class="btn-cyan text-sm py-3">AI Chat</button>
          <button onclick="location.reload()" class="btn-outline text-sm py-3 text-center">Refresh</button>
        </div>
      </div>
    </div>

    <div class="text-center text-gray-500 text-sm py-8 border-t border-[rgba(25,215,255,0.1)]">
      &copy; 2026 AcherLab. All rights reserved.
    </div>
  </main>

  <script>
    async function loadSystem() {
      try {
        const r = await fetch('/api/system');
        const d = await r.json();
        document.getElementById('cpuVal').textContent = d.cpu + '%';
        document.getElementById('memVal').textContent = d.memory + '%';
        document.getElementById('diskVal').textContent = d.disk + '%';
      } catch(e) {}
    }

    async function loadServices() {
      try {
        const r = await fetch('/api/services');
        const data = await r.json();
        const el = document.getElementById('services');
        el.innerHTML = data.map(s => `
          <div class="flex items-center justify-between p-3 rounded-lg bg-[rgba(25,215,255,0.03)] border border-[rgba(25,215,255,0.08)]">
            <span class="flex items-center gap-2">
              <span class="w-2 h-2 rounded-full bg-[#19D7FF]"></span>
              ${s.name}
            </span>
            <span class="text-[#19D7FF] text-sm">${s.status}</span>
          </div>
        `).join('');
      } catch(e) {}
    }

    async function loadTunnels() {
      try {
        const r = await fetch('/api/tunnels');
        const data = await r.json();
        const el = document.getElementById('tunnels');
        el.innerHTML = data.map(t => `
          <div class="flex items-center justify-between p-3 rounded-lg bg-[rgba(25,215,255,0.03)] border border-[rgba(25,215,255,0.08)]">
            <div>
              <span class="font-medium">${t.name}</span>
              <span class="text-gray-400 text-sm ml-2">${t.local} -> ${t.remote}</span>
            </div>
            <span class="text-${t.status === 'active' ? '[#19D7FF]' : 'gray-500'} text-sm">${t.status}</span>
          </div>
        `).join('');
      } catch(e) {}
    }

    async function sendChat() {
      const input = document.getElementById('chatInput');
      const box = document.getElementById('chatBox');
      const msg = input.value.trim();
      if (!msg) return;
      box.innerHTML += `<div class="text-white mb-2 text-right">Ban: ${msg}</div>`;
      input.value = '';
      try {
        const r = await fetch('/api/ai/chat', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({message: msg})
        });
        const d = await r.json();
        box.innerHTML += `<div class="text-[#19D7FF] mb-2">AcherLab AI: ${d.reply}</div>`;
      } catch(e) {
        box.innerHTML += `<div class="text-red-400 mb-2">AcherLab AI: Loi ket noi</div>`;
      }
      box.scrollTop = box.scrollHeight;
    }

    loadSystem(); loadServices(); loadTunnels();
    setInterval(loadSystem, 5000);
  </script>
</body>
</html>
